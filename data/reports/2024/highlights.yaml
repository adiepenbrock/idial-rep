# Highlights & Meilensteine 2024
# Bitte mit tatsächlichen Ereignissen aus dem Jahresbericht befüllen

- date: "Januar 2024"
  category: "Forschung"
  title: "Neues BMBF-Verbundprojekt bewilligt"
  description: "Das Bundesministerium für Bildung und Forschung fördert ein neues Verbundprojekt zur Untersuchung von KI-gestützten Arbeitsprozessen in kleinen und mittleren Unternehmen. IDiAL übernimmt die Koordination des Projekts."
  link: ""

- date: "März 2024"
  category: "Transfer"
  title: "User Innovation Center eröffnet"
  description: "Das neu gestaltete User Innovation Center öffnet seine Türen für Kooperationspartner und Studierende. Der Raum bietet modernste Infrastruktur für Ko-Innovationsprozesse, Prototyping und Nutzerstudien."
  link: ""

- date: "April 2024"
  category: "Lehre & Transfer"
  title: "Kooperationsprojekt mit regionalen KMU"
  description: "IDiAL startet eine neue Kooperationsreihe mit kleinen und mittleren Unternehmen aus der Region Dortmund. Studierende der FH Dortmund erarbeiten gemeinsam mit den Partnerunternehmen digitale Lösungskonzepte."
  link: ""

- date: "Juni 2024"
  category: "Forschung"
  title: "Internationaler Kongress zu autonomen Systemen"
  description: "IDiAL richtet gemeinsam mit der FH Dortmund eine internationale Fachkonferenz zu autonomen mobilen Systemen aus. Über 200 Forschende aus 18 Ländern nehmen teil und präsentieren aktuelle Ergebnisse."
  link: ""

- date: "September 2024"
  category: "Auszeichnung"
  title: "Best Paper Award auf der ECIS-Konferenz"
  description: "Ein Forschungsteam des IDiAL erhält auf der European Conference on Information Systems (ECIS) den Best Paper Award für ihre Arbeit zur Nutzerakzeptanz von KI-Systemen in der betrieblichen Praxis."
  link: ""

- date: "November 2024"
  category: "Nachwuchs"
  title: "Promotionsprogramm ausgebaut"
  description: "IDiAL erweitert sein strukturiertes Promotionsprogramm und begrüßt vier neue Doktorandinnen und Doktoranden. Das Programm fördert interdisziplinäre Forschung an der Schnittstelle von Technik und Gesellschaft."
  link: ""

- date: "Dezember 2024"
  category: "Bilanz"
  title: "Jahresabschluss: Rekordmitteleinwerbung"
  description: "Mit einer Drittmitteleinwerbung von über 2,8 Millionen Euro verzeichnet IDiAL 2024 ein Rekordjahr. Die Mittel fließen in neue Forschungsvorhaben und die Weiterentwicklung des Instituts."
  link: ""
