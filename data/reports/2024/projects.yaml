  description: "Empirische Studie zu Arbeitsbedingungen in plattformvermittelten Beschäftigungsformen (Gig Economy). Ziel ist die Entwicklung von Gestaltungsempfehlungen für faire und nachhaltige Plattformarbeit."
  funding: "Hans-Böckler-Stiftung"
  duration: "2023–2025"
  tags: ["Plattformarbeit", "Arbeit", "Recht"]
  url: ""

