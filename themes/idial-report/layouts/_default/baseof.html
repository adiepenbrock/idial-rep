<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="page-{{ .Section | default "home" }} lang-{{ .Site.Language.Lang }}">
  <div id="scroll-progress"></div>
  {{ partial "nav.html" . }}
  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <button class="back-to-top" id="back-to-top" aria-label="{{ i18n "backToTopAria" }}">
    <span aria-hidden="true">↑</span>
  </button>
  <script src="{{ "js/main.js" | relURL }}"></script>
</body>
</html>
